version: "1"
provider: aws

variables:
  - name: APP_ENV
    value: "production"

groups:
  - name: aws-params
    source:
      type: parameter
      region: "ap-northeast-1"
    variables:
      - name: DB_HOST
        source:
          key: "/myapp/prod/db-host"

      - name: DB_PORT
        source:
          key: "/myapp/prod/db-port"
        validate:
          pattern: "^[0-9]+$"
